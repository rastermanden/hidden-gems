<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Hidden Gems</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --green: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --cream: #faf7f2;
    --ink: #1a1a1a;
    --muted: #6b7280;
    --border: rgba(0,0,0,0.08);
    --card: #ffffff;
    --radius: 16px;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--sans);
    background: var(--cream);
    color: var(--ink);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--green);
    color: white;
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  header h1 {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  header p {
    font-size: 11px;
    opacity: 0.65;
    margin-top: 1px;
    font-weight: 300;
  }

  .add-fab {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: white;
    color: var(--green);
    border: none;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 300;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .add-fab:active { transform: scale(0.92); }

  /* Map */
  .map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }
  #map {
    position: absolute;
    inset: 0;
  }

  .map-crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1000;
    pointer-events: none;
    display: none;
  }
  .map-crosshair.active { display: block; }

  /* Bottom sheet list */
  .sheet {
    background: var(--card);
    border-radius: var(--radius) var(--radius) 0 0;
    box-shadow: 0 -2px 20px rgba(0,0,0,0.08);
    flex-shrink: 0;
    max-height: 38vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 5;
  }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 8px;
    flex-shrink: 0;
  }

  .sheet-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 16px 8px;
    flex-shrink: 0;
  }

  .gem-list {
    overflow-y: auto;
    padding: 0 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    -webkit-overflow-scrolling: touch;
  }

  .gem-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--cream);
    border-radius: 12px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .gem-card:active { background: var(--green-pale); }
  .gem-card.selected { border-color: var(--green-light); background: var(--green-pale); }

  .gem-emoji {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--green-pale);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .gem-photo-thumb {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .gem-info { flex: 1; min-width: 0; }
  .gem-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gem-note { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

  .empty-state {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .empty-state span { display: block; font-size: 28px; margin-bottom: 6px; }

  /* Modal overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--card);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-height: 90dvh;
    overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
    transform: translateY(40px);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    -webkit-overflow-scrolling: touch;
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 0;
  }
  .modal-title { font-family: var(--serif); font-size: 18px; font-weight: 500; }
  .modal-close {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--cream);
    border: none;
    font-size: 16px;
    cursor: pointer;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
  }

  .modal-body { padding: 16px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.04em; }
  .field input, .field textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 15px;
    font-family: var(--sans);
    background: var(--cream);
    color: var(--ink);
    outline: none;
    -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--green-light); }
  .field textarea { height: 80px; resize: none; }

  .coord-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .locate-btn {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px dashed var(--green-light);
    background: var(--green-pale);
    color: var(--green);
    font-size: 13px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 14px;
  }

  .photo-zone {
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    position: relative;
    overflow: hidden;
  }
  .photo-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-zone:hover { border-color: var(--green-light); background: var(--green-pale); }
  .photo-zone .icon { font-size: 24px; display: block; margin-bottom: 4px; }

  #photoPreview {
    width: 100%;
    border-radius: 10px;
    max-height: 160px;
    object-fit: cover;
    display: none;
    margin-bottom: 14px;
  }

  .save-btn {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.15s;
  }
  .save-btn:disabled { opacity: 0.5; }
  .save-btn:active { opacity: 0.8; }

  /* Detail modal */
  .detail-photo {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .detail-emoji-header {
    width: 100%;
    height: 120px;
    background: var(--green-pale);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .detail-body { padding: 16px; }
  .detail-name { font-family: var(--serif); font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .detail-coords { font-size: 12px; color: var(--muted); margin-bottom: 12px; font-weight: 300; letter-spacing: 0.02em; }
  .detail-note { font-size: 15px; color: var(--ink); line-height: 1.65; }
  .detail-date { font-size: 11px; color: var(--muted); margin-top: 14px; }

  .delete-btn {
    width: 100%;
    padding: 12px;
    background: none;
    color: #dc2626;
    border: 1px solid rgba(220,38,38,0.2);
    border-radius: 10px;
    font-size: 14px;
    font-family: var(--sans);
    cursor: pointer;
    margin-top: 12px;
  }

  /* Leaflet custom marker */
  .gem-marker {
    width: 32px; height: 32px;
    background: var(--green);
    border: 3px solid white;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .toast {
    position: fixed;
    bottom: 50%;
    left: 50%;
    transform: translate(-50%, 50%);
    background: var(--ink);
    color: white;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }

  /* Auth screen */
  .auth-screen {
    position: fixed;
    inset: 0;
    background: var(--cream);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }
  .auth-screen.hidden { display: none; }
  .auth-logo { font-family: var(--serif); font-size: 28px; color: var(--green); margin-bottom: 6px; }
  .auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
  .auth-box {
    width: 100%;
    max-width: 360px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  }
  .auth-box h2 { font-family: var(--serif); font-size: 20px; margin-bottom: 4px; }
  .auth-box p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .auth-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: var(--sans);
    background: var(--cream);
    color: var(--ink);
    outline: none;
    margin-bottom: 12px;
    -webkit-appearance: none;
  }
  .auth-input:focus { border-color: var(--green-light); }
  .auth-btn {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .auth-btn:disabled { opacity: 0.5; }
  .auth-sent { text-align: center; padding: 8px 0; }
  .auth-sent .big { font-size: 36px; margin-bottom: 8px; }
  .auth-sent p { font-size: 14px; color: var(--muted); line-height: 1.6; }

  .logout-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    font-family: var(--sans);
    cursor: pointer;
  }

  /* Pick bar */
  .pick-bar {
    background: var(--card);
    border-radius: var(--radius) var(--radius) 0 0;
    box-shadow: 0 -2px 20px rgba(0,0,0,0.1);
    padding: 14px 16px 16px;
    flex-shrink: 0;
    display: none;
    z-index: 5;
  }
  .pick-bar.active { display: block; }
  .pick-hint { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 6px; }
  .pick-coords-display {
    font-size: 13px;
    color: var(--ink);
    text-align: center;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .pick-actions { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
  .pick-cancel {
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: none;
    font-size: 14px;
    font-family: var(--sans);
    color: var(--muted);
    cursor: pointer;
  }
  .pick-confirm {
    padding: 12px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-family: var(--sans);
    font-weight: 500;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- Auth screen -->
<div class="auth-screen" id="authScreen">
  <div class="auth-logo">Hidden Gems</div>
  <div class="auth-sub">Your secret places</div>
  <div class="auth-box" id="authBox">
    <h2>Sign in</h2>
    <p>Enter your email and we'll send you a magic link.</p>
    <input class="auth-input" type="email" id="authEmail" placeholder="you@example.com" />
    <button class="auth-btn" id="authBtn" onclick="sendMagicLink()">Send magic link</button>
  </div>
</div>

<header>
  <div>
    <h1>Hidden Gems</h1>
    <p id="userEmail" style="font-size:11px;opacity:0.65;margin-top:1px;font-weight:300;"></p>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="logout-btn" onclick="signOut()">Sign out</button>
    <button class="add-fab" onclick="openAdd()" title="Add gem">+</button>
  </div>
</header>

<div class="map-wrap">
  <div id="map">
    <div class="map-crosshair" id="mapCrosshair">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="22" y1="2" x2="22" y2="18" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="22" y1="26" x2="22" y2="42" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="2" y1="22" x2="18" y2="22" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="26" y1="22" x2="42" y2="22" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="22" cy="22" r="4" fill="#2d6a4f"/>
        <circle cx="22" cy="22" r="7" stroke="#2d6a4f" stroke-width="1.5" fill="none" opacity="0.4"/>
      </svg>
    </div>
  </div>
</div>

<!-- Pick bar (step 1: pan map to location) -->
<div class="pick-bar" id="pickBar">
  <div class="pick-hint">📍 Pan the map to your gem</div>
  <div class="pick-coords-display" id="pickCoordsDisplay">—</div>
  <div class="pick-actions">
    <button class="pick-cancel" onclick="cancelPick()">Cancel</button>
    <button class="pick-confirm" onclick="confirmPick()">Set location →</button>
  </div>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle">Your gems</div>
  <div class="gem-list" id="gemList">
    <div class="empty-state"><span>🌿</span>Tap + to add your first hidden gem</div>
  </div>
</div>

<!-- Add modal -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">New gem</span>
      <button class="modal-close" onclick="closeAdd()">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>NAME</label>
        <input type="text" id="inName" placeholder="What's this place called?" />
      </div>
      <div class="field">
        <label>NOTE</label>
        <textarea id="inNote" placeholder="What makes it special?"></textarea>
      </div>
      <input type="hidden" id="inLat" />
      <input type="hidden" id="inLng" />
      <img id="photoPreview" alt="preview" />
      <div class="field">
        <label>PHOTO (optional)</label>
        <div class="photo-zone">
          <span class="icon">📷</span>
          Tap to add a photo
          <input type="file" accept="image/*" onchange="previewPhoto(this)" id="photoInput" />
        </div>
      </div>
      <button class="save-btn" id="saveBtn" onclick="saveGem()">Save gem</button>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="overlay" id="detailOverlay">
  <div class="modal" id="detailModal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ptnzegjtpvwlzuvmodac.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0bnplZ2p0cHZ3bHp1dm1vZGFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjQ1MjAsImV4cCI6MjA5MDgwMDUyMH0.5febQSFyDSz6R0p-5ctruat6QnJ2aeKNWnnDAFytwfk';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { flowType: 'pkce' }
});

const EMOJIS = ['🌿','🏞️','🌊','🏛️','🌸','🍃','🌄','🗿','🌺','🦋','🌙','⛰️'];
let gems = [];
let markers = {};
let selectedFile = null;
let map;
let currentUser = null;

// ── Auth ──────────────────────────────────────────────────────────────────────

function showAuthScreen() {
  document.getElementById('authScreen').classList.remove('hidden');
}

function hideAuthScreen() {
  document.getElementById('authScreen').classList.add('hidden');
}

async function sendMagicLink() {
  const email = document.getElementById('authEmail').value.trim();
  if (!email) { return; }
  const btn = document.getElementById('authBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  const redirectTo = window.location.hostname === 'localhost'
    ? 'https://rastermanden.github.io/hidden-gems/'
    : window.location.origin + window.location.pathname;
  const { error } = await db.auth.signInWithOtp({ email, options: { shouldCreateUser: true, emailRedirectTo: redirectTo } });
  if (error) {
    btn.disabled = false;
    btn.textContent = 'Send magic link';
    showToast('Error: ' + error.message);
    return;
  }
  document.getElementById('authBox').innerHTML = `
    <div class="auth-sent">
      <div class="big">📬</div>
      <p>Check your inbox!<br>Click the link in the email to sign in.</p>
    </div>`;
}

async function signOut() {
  await db.auth.signOut();
}

db.auth.onAuthStateChange((event, session) => {
  currentUser = session?.user ?? null;
  if (currentUser) {
    hideAuthScreen();
    document.getElementById('userEmail').textContent = currentUser.email;
    loadGems();
  } else {
    showAuthScreen();
    // Clear map markers and list
    Object.values(markers).forEach(m => m.remove());
    markers = {};
    gems = [];
    renderList();
  }
});

// ── Map ───────────────────────────────────────────────────────────────────────

function initMap() {
  map = L.map('map', { zoomControl: false }).setView([55.676, 12.568], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
  }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);
}

function createMarkerIcon() {
  return L.divIcon({
    className: '',
    html: '<div class="gem-marker"></div>',
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -36]
  });
}

function addMarker(gem) {
  if (!gem.lat || !gem.lng) return;
  if (markers[gem.id]) { markers[gem.id].remove(); }
  const m = L.marker([gem.lat, gem.lng], { icon: createMarkerIcon() }).addTo(map);
  m.on('click', () => showDetail(gem));
  markers[gem.id] = m;
}

// ── List ──────────────────────────────────────────────────────────────────────

function renderList() {
  const list = document.getElementById('gemList');
  const title = document.getElementById('sheetTitle');
  title.textContent = gems.length === 1 ? '1 gem' : `${gems.length} gems`;
  if (gems.length === 0) {
    list.innerHTML = '<div class="empty-state"><span>🌿</span>Tap + to add your first hidden gem</div>';
    return;
  }
  list.innerHTML = gems.map(g => {
    const thumb = g.photo_url
      ? `<img class="gem-photo-thumb" src="${g.photo_url}" alt="" />`
      : `<div class="gem-emoji">${g.emoji || '🌿'}</div>`;
    return `<div class="gem-card" id="card-${g.id}" onclick="selectGem('${g.id}')">
      ${thumb}
      <div class="gem-info">
        <div class="gem-name">${g.name}</div>
        <div class="gem-note">${g.note || 'No notes'}</div>
      </div>
    </div>`;
  }).join('');
}

function selectGem(id) {
  const gem = gems.find(g => g.id === id);
  if (!gem) return;
  document.querySelectorAll('.gem-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('card-' + id);
  if (card) card.classList.add('selected');
  if (gem.lat && gem.lng) map.flyTo([gem.lat, gem.lng], 16, { duration: 0.8 });
  showDetail(gem);
}

// ── Detail ────────────────────────────────────────────────────────────────────

function showDetail(gem) {
  const photoEl = gem.photo_url
    ? `<img class="detail-photo" src="${gem.photo_url}" alt="${gem.name}" />`
    : `<div class="detail-emoji-header">${gem.emoji || '🌿'}</div>`;
  const coords = gem.lat && gem.lng
    ? `${parseFloat(gem.lat).toFixed(5)}, ${parseFloat(gem.lng).toFixed(5)}`
    : 'No coordinates';
  const date = gem.created_at ? new Date(gem.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' }) : '';
  document.getElementById('detailModal').innerHTML = `
    ${photoEl}
    <div class="modal-header" style="margin-top:4px;">
      <span class="modal-title" style="font-family:var(--serif)">${gem.name}</span>
      <button class="modal-close" onclick="closeDetail()">×</button>
    </div>
    <div class="detail-body">
      <div class="detail-coords">📍 ${coords}</div>
      <div class="detail-note">${gem.note || '<em style="color:var(--muted)">No notes added</em>'}</div>
      ${date ? `<div class="detail-date">Added ${date}</div>` : ''}
      <button class="delete-btn" onclick="deleteGem('${gem.id}')">Delete this gem</button>
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }

// ── Add / Save ────────────────────────────────────────────────────────────────

function updateCoordsFromMap() {
  const c = map.getCenter();
  document.getElementById('inLat').value = c.lat.toFixed(6);
  document.getElementById('inLng').value = c.lng.toFixed(6);
  document.getElementById('pickCoordsDisplay').textContent =
    c.lat.toFixed(5) + ', ' + c.lng.toFixed(5);
}

// Step 1: show crosshair + pick bar, map is fully interactive
function openAdd() {
  document.getElementById('sheet').style.display = 'none';
  document.getElementById('pickBar').classList.add('active');
  document.getElementById('mapCrosshair').classList.add('active');
  updateCoordsFromMap();
  map.on('move', updateCoordsFromMap);
}

function cancelPick() {
  document.getElementById('pickBar').classList.remove('active');
  document.getElementById('sheet').style.display = '';
  document.getElementById('mapCrosshair').classList.remove('active');
  map.off('move', updateCoordsFromMap);
}

// Step 2: location confirmed, open the details form
function confirmPick() {
  document.getElementById('pickBar').classList.remove('active');
  document.getElementById('mapCrosshair').classList.remove('active');
  map.off('move', updateCoordsFromMap);
  document.getElementById('addOverlay').classList.add('open');
}

function closeAdd() {
  document.getElementById('addOverlay').classList.remove('open');
  document.getElementById('sheet').style.display = '';
  document.getElementById('inName').value = '';
  document.getElementById('inNote').value = '';
  document.getElementById('inLat').value = '';
  document.getElementById('inLng').value = '';
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('photoInput').value = '';
  selectedFile = null;
}

function previewPhoto(input) {
  if (!input.files || !input.files[0]) return;
  selectedFile = input.files[0];
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('photoPreview');
    img.src = e.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(selectedFile);
}


async function saveGem() {
  const name = document.getElementById('inName').value.trim();
  const note = document.getElementById('inNote').value.trim();
  const lat = parseFloat(document.getElementById('inLat').value);
  const lng = parseFloat(document.getElementById('inLng').value);
  if (!name) { showToast('Please enter a name'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  let photo_url = null;
  if (selectedFile) {
    const ext = selectedFile.name.split('.').pop();
    const path = `${currentUser.id}/${Date.now()}.${ext}`;
    const { error: upErr } = await db.storage.from('gem-photos').upload(path, selectedFile);
    if (!upErr) {
      const { data } = db.storage.from('gem-photos').getPublicUrl(path);
      photo_url = data.publicUrl;
    }
  }

  const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  const { data, error } = await db.from('gems').insert([{
    name, note,
    lat: isNaN(lat) ? null : lat,
    lng: isNaN(lng) ? null : lng,
    photo_url, emoji,
    user_id: currentUser.id
  }]).select().single();

  btn.disabled = false;
  btn.textContent = 'Save gem';

  if (error) { showToast('Error: ' + error.message); return; }
  gems.unshift(data);
  addMarker(data);
  renderList();
  closeAdd();
  showToast('Gem saved!');
  if (data.lat && data.lng) map.flyTo([data.lat, data.lng], 16);
}

async function deleteGem(id) {
  if (!confirm('Delete this gem?')) return;
  await db.from('gems').delete().eq('id', id);
  if (markers[id]) { markers[id].remove(); delete markers[id]; }
  gems = gems.filter(g => g.id !== id);
  renderList();
  closeDetail();
  showToast('Gem deleted');
}

// ── Utils ─────────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function loadGems() {
  const { data, error } = await db.from('gems').select('*').order('created_at', { ascending: false });
  if (error) { showToast('Could not load gems'); return; }
  gems = data || [];
  gems.forEach(addMarker);
  renderList();
  if (gems.length > 0 && gems[0].lat) {
    const bounds = gems.filter(g => g.lat).map(g => [g.lat, g.lng]);
    if (bounds.length === 1) map.setView(bounds[0], 14);
    else map.fitBounds(bounds, { padding: [40, 40] });
  }
}

// Close overlays on background tap
document.getElementById('addOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeAdd(); });
document.getElementById('detailOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });

initMap();
</script>
</body>
</html>
